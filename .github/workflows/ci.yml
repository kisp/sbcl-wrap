name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: Build & smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build
        run: nix build --print-build-logs

      - name: Smoke-test binary (no args → exit 88)
        run: |
          set +e
          ./result/bin/sbcl-wrap 2>&1
          EXIT=$?
          set -e
          [ "$EXIT" -eq 88 ] || { echo "Expected exit 88, got $EXIT"; exit 1; }

  integration:
    name: Integration tests (sbcl + libraries)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build sbcl-wrap
        run: nix build --print-build-logs

      - name: Run integration tests
        run: |
          # Use a throw-away HOME so cache writes are isolated from the runner
          export HOME=$(mktemp -d)
          nix run .#test
